<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Yave — La llave de tu próximo hogar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0F4C8A;--brand-l:#EBF3FF;--brand-d:#082F5A;
  --green:#1DB87A;--green-l:#E6F9F0;
  --amber:#E8900A;--amber-l:#FEF3DC;
  --red:#D63030;--red-l:#FEEAEA;
  --ink:#0D0D0D;--ink2:#444;--ink3:#888;--ink4:#C8D0DC;
  --bg:#F6F8FC;--surface:#fff;--border:#E4EBF5;
  --r:10px;--r2:16px;--r3:24px;
  --sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.09);--sh3:0 12px 40px rgba(0,0,0,.12);
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --nav:60px;
}
html{font-size:15px}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button,input,select{font-family:var(--sans)}
input[type=range]{accent-color:var(--brand);width:100%;cursor:pointer}
input[type=checkbox]{accent-color:var(--brand);width:16px;height:16px;cursor:pointer}
input,select{width:100%;padding:9px 12px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);color:var(--ink);font-size:.88rem;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--brand)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#D0D9E8;border-radius:3px}

/* LAYOUT */
.page{display:none;min-height:calc(100vh - var(--nav));animation:fadeUp .3s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:var(--nav);display:flex;align-items:center;padding:0 20px;gap:0}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;margin-right:20px}
.nav-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:16px}
.nav-logo-text{font-family:var(--serif);font-size:1.15rem;color:var(--ink);letter-spacing:-.3px}
.nav-link{padding:0 12px;height:var(--nav);display:flex;align-items:center;font-size:.86rem;font-weight:500;color:var(--ink3);border-bottom:2.5px solid transparent;cursor:pointer;transition:all .15s;text-decoration:none}
.nav-link:hover,.nav-link.active{color:var(--brand)}
.nav-link.active{border-bottom-color:var(--brand)}
.nav-spacer{flex:1}
.nav-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 10px;border-radius:var(--r);border:1.5px solid var(--border);background:#fff}
.nav-avatar{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.nav-username{font-size:.83rem;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-dropdown{position:absolute;right:20px;top:var(--nav);background:#fff;border-radius:var(--r2);border:1.5px solid var(--border);padding:5px;min-width:190px;box-shadow:var(--sh3);z-index:200;display:none}
.nav-dropdown.open{display:block}
.nav-dd-item{width:100%;padding:7px 12px;border:none;background:transparent;text-align:left;font-size:.83rem;color:var(--ink);cursor:pointer;border-radius:6px;display:block}
.nav-dd-item:hover{background:var(--bg)}
.nav-dd-item.danger{color:var(--red)}
.nav-dd-sep{height:1px;background:var(--bg);margin:3px 0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:600;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans);font-size:.88rem}
.btn-p{background:var(--brand);color:#fff;padding:9px 20px}.btn-p:hover{background:var(--brand-d)}
.btn-s{background:#fff;color:var(--ink);padding:9px 20px;border:1.5px solid var(--border)}.btn-s:hover{border-color:var(--brand);color:var(--brand)}
.btn-g{background:var(--green);color:#fff;padding:9px 20px}.btn-g:hover{background:#179A65}
.btn-sm{padding:6px 13px;font-size:.8rem}
.btn-lg{padding:12px 26px;font-size:.95rem}
.btn-full{width:100%}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-g{background:var(--green-l);color:#0A7A4F}
.badge-b{background:var(--brand-l);color:var(--brand)}
.badge-a{background:var(--amber-l);color:#9A5C00}
.badge-r{background:var(--red-l);color:var(--red)}
.badge-gray{background:#F0F2F5;color:var(--ink3)}

/* ALERTS */
.alert{border-radius:var(--r);padding:10px 14px;font-size:.83rem;line-height:1.55;margin-bottom:10px}
.alert-i{background:var(--brand-l);color:var(--brand)}
.alert-s{background:var(--green-l);color:#0A7A4F}
.alert-w{background:var(--amber-l);color:#9A5C00}
.alert-r{background:var(--red-l);color:var(--red)}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r2);border:1.5px solid var(--border);box-shadow:var(--sh)}
.tr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg);font-size:.83rem}
.tr:last-child{border-bottom:none}
.fl{display:block;font-size:.75rem;font-weight:600;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em}

/* PROGRESS */
.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;transition:width .4s}

/* PROP CARDS */
.pcard{background:#fff;border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;border:1.5px solid var(--border)}
.pcard:hover{transform:translateY(-2px);box-shadow:var(--sh3)}
.pcard.fit-hi{border-color:var(--green)}
.pcard.fit-ok{border-color:#A8E0C8}
.pcard.fit-no{border-color:#FDDCDC}

/* SCORE RING */
.score-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.score-num{position:absolute;text-align:center}

/* FIT BAR */
.fbar{height:5px;border-radius:3px;background:#E8EEF6;overflow:hidden}
.fbar-f{height:100%;border-radius:3px;transition:width .5s}

/* STEPS */
.steps{display:flex;gap:3px;margin-bottom:22px}
.step{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.step.done{background:var(--green)}
.step.active{background:var(--brand)}

/* TOGGLE VIEW */
.vtog{display:flex;border-radius:var(--r);border:1.5px solid var(--border);overflow:hidden}
.vtb{padding:6px 14px;border:none;background:transparent;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--ink3);transition:.15s;font-family:var(--sans)}
.vtb.active{background:var(--brand);color:#fff}

/* BUSCAR LAYOUT */
.buscar-wrap{display:flex;flex-direction:row;height:calc(100vh - var(--nav));overflow:hidden}
.buscar-sidebar{width:250px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.buscar-main{flex:1;overflow:hidden;position:relative}
.buscar-list{height:100%;overflow-y:auto;padding:14px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}

/* MAP */
.map-wrap{height:100%}
.map-mini-cards{position:absolute;bottom:10px;left:10px;right:10px;display:flex;gap:8px;overflow-x:auto;z-index:500;padding-bottom:2px}
.map-mini-card{background:#fff;border-radius:var(--r2);border:1.5px solid var(--border);padding:10px 12px;cursor:pointer;flex-shrink:0;width:170px;box-shadow:var(--sh2)}
.ym{background:#fff;border:2px solid var(--brand);border-radius:20px;padding:3px 8px;font-size:.68rem;font-weight:700;color:var(--brand);white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer}
.ym.hi{border-color:var(--green);color:var(--green)}
.ym.lo{border-color:var(--amber);color:var(--amber)}
.map-popup .leaflet-popup-content-wrapper{border-radius:12px;padding:0;border:1.5px solid var(--border);box-shadow:var(--sh3)}
.map-popup .leaflet-popup-content{margin:0;width:210px!important}
.map-popup .leaflet-popup-close-button{display:none}

/* HERO */
.hero{background:var(--brand);padding:64px 24px 72px;position:relative;overflow:hidden;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%, rgba(29,184,122,.18) 0%, transparent 60%)}
.hero-inner{max-width:600px;margin:0 auto;position:relative}
.hero h1{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.9rem);color:#fff;line-height:1.1;margin-bottom:16px;letter-spacing:-.02em}
.hero h1 em{font-style:italic;color:#7DDCB0}
.hero p{font-size:1rem;color:rgba(255,255,255,.75);line-height:1.65;margin-bottom:28px;max-width:460px;margin-left:auto;margin-right:auto}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-ghost{padding:11px 22px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.85);font-size:.93rem;font-weight:500;cursor:pointer;font-family:var(--sans)}

/* STATS BAR */
.stats-bar{background:#fff;border-bottom:1px solid var(--border)}
.stats-grid{max-width:740px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
.stat-item{text-align:center;padding:18px 12px;border-right:1px solid var(--border)}
.stat-val{font-family:var(--serif);font-size:1.7rem;color:var(--brand);line-height:1}
.stat-lbl{font-size:.75rem;color:var(--ink3);margin-top:3px}

/* HOW IT WORKS */
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.step-card{border-radius:var(--r3);padding:24px 20px}
.step-num{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.2rem;color:#fff;margin-bottom:12px}
.cta-dark{background:var(--ink);border-radius:var(--r3);padding:28px 32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}

/* AUTH PAGES */
.auth-wrap{max-width:400px;margin:0 auto;padding:36px 20px}
.auth-logo{width:42px;height:42px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:18px;margin:0 auto 12px}
.cu-btn{display:flex;align-items:center;gap:12px;padding:16px;border-radius:var(--r2);border:2px solid var(--brand);background:var(--brand-l);cursor:pointer;margin-bottom:14px}
.cu-icon{width:44px;height:44px;border-radius:var(--r);background:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.divider-text{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:.75rem;color:var(--ink4)}
.divider-line{flex:1;height:1px;background:var(--border)}

/* SCORE ONBOARDING */
.onboard-wrap{max-width:460px;margin:0 auto;padding:28px 20px}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.tipo-card{padding:12px;border-radius:var(--r2);border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .15s}
.tipo-card.selected{border-color:var(--brand);background:var(--brand-l)}
.tipo-card-title{font-size:.9rem;font-weight:700;margin-bottom:3px}
.tipo-card-sub{font-size:.72rem;color:var(--ink3);line-height:1.5}
.pv-check{background:#fff;border-radius:var(--r2);padding:12px 14px;border:1.5px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:14px}

/* SLIDER ROW */
.sli-row{margin-bottom:14px}
.sli-row label{display:flex;justify-content:space-between;font-size:.8rem;color:var(--ink3);margin-bottom:5px}
.sli-row label span{font-weight:600;color:var(--brand)}

/* CONSENT */
.consent-main{display:flex;align-items:flex-start;gap:12px;padding:16px;border-radius:var(--r2);border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;margin-bottom:12px}
.consent-main.checked{border-color:var(--green)}
.consent-cb{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
.consent-cb.checked{background:var(--green);border-color:var(--green)}
.consent-expand{background:none;border:none;color:var(--brand);font-size:.75rem;cursor:pointer;padding:4px 0;font-family:var(--sans)}
.consent-detail{margin-top:8px;border-top:1px solid var(--bg);padding-top:8px}
.consent-detail-row{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--bg);font-size:.75rem}

/* DETALLE PROP */
.detalle-grid{display:grid;grid-template-columns:1fr 290px;gap:16px;align-items:start}
.detalle-sticky{position:sticky;top:calc(var(--nav) + 14px);background:#fff;border-radius:var(--r2);border:1.5px solid var(--border);padding:16px;box-shadow:var(--sh2)}
.timeline{display:flex;align-items:center;gap:0;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.tl-item{display:flex;align-items:center;flex-shrink:0}
.tl-line{width:18px;height:2px;background:var(--border)}
.tl-line.done{background:var(--green)}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.tl-dot{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--ink4);display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:700}
.tl-dot.done{background:var(--green);color:#fff}
.tl-dot.active{background:var(--brand);color:#fff;border:2px solid var(--brand)}
.tl-lbl{font-size:.62rem;color:var(--ink4);font-weight:400;white-space:nowrap}
.tl-lbl.active{color:var(--brand);font-weight:700}
.tl-lbl.done{color:var(--green)}

/* BANCO SELECT */
.banco-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:1.5px solid var(--border);background:#fff;cursor:pointer;margin-bottom:5px;transition:all .15s}
.banco-opt.selected{border-color:var(--brand);background:var(--brand-l)}
.banco-ini{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0}

/* PANEL VENDEDOR */
.pv-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.pv-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--ink3);font-family:var(--sans);transition:all .15s}
.pv-tab.active{background:var(--brand);border-color:var(--brand);color:#fff}

/* SCORE MUNICIPIO */
.muni-row{display:grid;grid-template-columns:1fr 65px 85px 45px 40px;padding:8px 12px;gap:4px;cursor:pointer;border-bottom:1px solid var(--bg);transition:background .1s;align-items:center}
.muni-row:hover,.muni-row.sel{background:var(--green-l)}
.muni-detail{background:var(--green-l);padding:12px 14px;border:1px solid #A8E0C8}

/* PORTAL BANCO */
.portal-header{background:var(--brand);padding:18px 20px 0}
.portal-tabs{display:flex;overflow-x:auto}
.portal-tab{padding:8px 16px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:.83rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:var(--sans)}
.portal-tab.active{color:#fff;font-weight:700;border-bottom-color:#fff}
.portal-content{max-width:540px;margin:0 auto;padding:22px 20px}
.banco-sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.banco-sel-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--r2);border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:border-color .15s}
.banco-sel-card:hover{border-color:var(--brand)}

/* RESPONSIVE */
@media(max-width:768px){
  :root{--nav:52px}
  .nav-link{display:none}
  .buscar-wrap{flex-direction:column;height:auto}
  .buscar-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;flex-wrap:wrap;max-height:none}
  .buscar-main{min-height:60vh}
  .buscar-list{height:auto}
  .cards-grid{grid-template-columns:1fr}
  .detalle-grid{grid-template-columns:1fr}
  .detalle-sticky{position:static}
  .steps-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .cta-dark{flex-direction:column}
  .hero{padding:48px 20px 56px}
}
</style>
</head>

<nav class="nav" id="nav">

</nav>

<div id="page-buscar" class="page"></div>
<div id="page-propiedad" class="page"></div>

/* ═══ MATH ═══ */
const amort=(r,p)=>{const m=r/12,n=p*12;return m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1)};
const ratioMax=pie=>{if(pie<15)return 0;return Math.max(.25,Math.min(.32,.25+(pie-15)/20*.07))};
const calcTecho=(ing,pie,cae,p)=>{const rm=ratioMax(pie);if(!rm||!ing)return 0;return(ing*rm/amort(cae||.044,p||30))/(1-pie/100)};
const fitPct=(C,P)=>{
  if(!C||!C.ingreso)return 0;
  const cae=C.pv&&P.uf<=4000?.044:.052;
  const cuota=P.uf*UF*(1-C.pie/100)*amort(cae,30);
  const ratio=cuota/C.ingreso;
  const rm=ratioMax(C.pie);
  const sMin=P.uf>6000?720:P.uf>4000?700:680;
  if(C.score<sMin||ratio>rm||C.pie<15)return 0;
  return Math.round((.35*Math.min((C.score-sMin)/100,1)+.30*Math.min(1-ratio/rm,1)+.20*Math.min((C.pie-15)/20,1)+.15*(C.pv&&P.uf<=4000?1:.5))*100);
};
const sCol=s=>s>=720?'#085041':s>=680?'#0A7A4F':s>=650?'#9A5C00':'#D63030';
const fCol=f=>f>=50?'#0A7A4F':f>=25?'#9A5C00':'#D63030';
const fLbl=f=>f>=75?'Zona cómoda':f>=50?'Califica bien':f>=25?'Al límite':'No califica';
const fmtUF=v=>v.toLocaleString('es-CL')+' UF';
const fmtK=v=>'$'+(v>=1e6?(v/1e6).toFixed(1)+'M':Math.round(v/1000)+'K');

function goTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  if(el){el.classList.add('active');window.scrollTo(0,0);}
  state.page=page;

  render(page);
}
function render(page){
  const el=document.getElementById('page-'+page);
  if(!el)return;
  const renders={landing:renderLanding,register:renderRegister,login:renderLogin,score:renderScore,buscar:renderBuscar,propiedad:renderPropiedad,vender:renderVender,perfil_vendedor:renderPerfilVendedor,municipios:renderMunicipios,portal_banco:renderPortalBanco};

  afterRender(page);
}
function afterRender(page){
  if(page==='buscar')initMap();

function initMap(){

  const map=L.map(el,{zoomControl:true}).setView([-33.46,-70.65],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  state.mapInstance=map;
  const p=state.perfil;const bs=state.buscar;const tuf=p.listo?Math.round(p.techo/UF):99999;
  PROPS.filter(pr=>bs.tipo==='Todos'||pr.tip===bs.tipo).filter(pr=>pr.uf<=bs.ufMax||bs.ufMax===12000).filter(pr=>!bs.soloRango||pr.uf<=tuf).forEach(pr=>{
    const fit=p.listo?fitPct(p,pr):pr.id<=3?78:pr.id<=5?62:25;

      +'<div style="height:85px;background:'+pr.col+';display:flex;align-items:center;justify-content:center;font-size:26px;border-radius:10px 10px 0 0">'+(pr.tip==='Casa'?'🏡':'🏢')+'</div>'

  });
}

    content=`<h3 style="font-family:var(--serif);font-size:1.4rem;margin-bottom:4px">Hoja de ruta regulatoria</h3><p style="font-size:.83rem;color:var(--ink3);margin-bottom:16px;line-height:1.6">Qué puede usar tu institución hoy y qué requiere el registro RPSF ante la CMF.</p><div class="card" style="padding:16px;margin-bottom:14px"><div style="font-size:.72rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px">Cronograma RPSF</div>${[['Hoy','MVP operativo + piloto informal','Score orientativo · promesa digital · sin RPSF','var(--green)',true],['Mes 1–2','Constitución SpA + docs CMF','Giro exclusivo · políticas internas · ciberseguridad','var(--brand)',false],['Mes 2–3','Presentación formal ante CMF','Expediente completo + fee de registro','var(--brand)',false],['Mes 3–6','Evaluación CMF (60–90 días hábiles)','Pueden solicitar documentación complementaria','var(--amber)',false],['Mes 5–7','RPSF obtenido','Pre-aprobación formal activa · originación vinculada','#534AB7',false]].map((ti,i)=>`<div style="display:flex;gap:12px;margin-bottom:${i<4?'16px':'0'}"><div style="width:14px;height:14px;border-radius:50%;background:${ti[4]?ti[3]:'#fff'};border:2px solid ${ti[3]};flex-shrink:0;margin-top:2px"></div><div><div style="display:flex;gap:8px;align-items:baseline;margin-bottom:2px"><span style="font-size:.68rem;font-weight:700;color:${ti[3]};min-width:48px">${ti[0]}</span><span style="font-size:.86rem;font-weight:600">${ti[1]}</span></div><div style="font-size:.72rem;color:var(--ink3);line-height:1.5">${ti[2]}</div></div></div>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><div style="background:var(--green-l);border-radius:var(--r2);border:1.5px solid #A8E0C8;overflow:hidden"><div style="background:#C8F0DF;padding:8px 12px;border-bottom:1px solid #A8E0C8;font-size:.72rem;font-weight:700;color:#085041;text-transform:uppercase">Disponible hoy</div><div style="padding:10px 12px">${HOY.map(item=>`<div style="display:flex;gap:7px;padding:4px 0;font-size:.78rem"><span style="color:var(--green);font-weight:700">✓</span><span>${item}</span></div>`).join('')}</div></div><div style="background:var(--red-l);border-radius:var(--r2);border:1.5px solid #FDDCDC;overflow:hidden"><div style="background:#FDDCDC;padding:8px 12px;border-bottom:1px solid #FDDCDC;font-size:.72rem;font-weight:700;color:var(--red);text-transform:uppercase">Requiere RPSF</div><div style="padding:10px 12px">${RPSF_L.map(item=>`<div style="display:flex;gap:7px;padding:4px 0;font-size:.78rem"><span style="color:var(--red);font-weight:700">○</span><span>${item}</span></div>`).join('')}</div></div></div>${alert('<strong>¿Podemos hacer un piloto hoy?</strong> Sí. El piloto puede operar con score orientativo y matching de propiedades, sin vincular formalmente el proceso de originación.','w')}`;
  }
  return`<div><div class="portal-header"><div style="max-width:540px;margin:0 auto"><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff">🏦</div><div><div style="font-size:.95rem;font-weight:700;color:#fff">Portal Institucional</div><div style="font-size:.7rem;color:rgba(255,255,255,.6)">Bancos · Mutuarias · Acceso privado</div></div></div><div class="portal-tabs">${[['crit','Criterios de riesgo'],['roi','Dashboard ROI'],['cmf','Hoja de ruta CMF']].map(([id,lbl])=>`<button class="portal-tab${t===id?' active':''}" onclick="state.portalTab='${id}';renderInPlace('page-portal_banco',renderPortalBanco)">${lbl}</button>`).join('')}</div></div></div><div class="portal-content">${content}</div></div>`;
}
function renderROINumbersHtml(){
  const vol=state.roi.vol;const ahorro=Math.round((600000-75000)*vol);const saas=350000;const roi=Math.round((ahorro-saas)/saas*100);
  return[[fmtK(ahorro),'Ahorro mensual est.','var(--green)'],[roi+'%','ROI vs. costo SaaS','var(--brand)'],['+'+(Math.round(vol*.92)-Math.round(vol*.65)),'Leads calificados extra','#085041']].map(([v,l,c])=>`<div class="card" style="padding:13px;text-align:center"><div style="font-family:var(--serif);font-size:1.7rem;color:${c};line-height:1;margin-bottom:3px">${v}</div><div style="font-size:.7rem;color:var(--ink3)">${l}</div></div>`).join('');
}
function renderROINumbers(){const el=document.getElementById('roi-numbers');if(el)el.innerHTML=renderROINumbersHtml();}
function bindPortalEvents(){}

/* ═══ INIT ═══ */
function renderInPlace(id,fn){
  const page=id.replace('page-','');
  const el=document.getElementById(id);
  if(el){el.innerHTML=fn();afterRender(page);}
}
goTo('landing');
</script>
